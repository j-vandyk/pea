name: Docker Build & Push (ACR)

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push pipeline image
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/pea-pipeline
          docker build -f Dockerfile -t $IMAGE:${{ github.sha }} .
          docker push $IMAGE:${{ github.sha }}
          docker tag $IMAGE:${{ github.sha }} $IMAGE:latest
          docker push $IMAGE:latest

      - name: Build and push dashboard image
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/pea-dashboard
          docker build -f Dockerfile.web -t $IMAGE:${{ github.sha }} .
          docker push $IMAGE:${{ github.sha }}
          docker tag $IMAGE:${{ github.sha }} $IMAGE:latest
          docker push $IMAGE:latest

      - name: Image digest
        run: |
          echo "Pipeline: ${{ secrets.ACR_LOGIN_SERVER }}/pea-pipeline:${{ github.sha }}"
          echo "Dashboard: ${{ secrets.ACR_LOGIN_SERVER }}/pea-dashboard:${{ github.sha }}"

      - name: Log in to Azure CLI
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container Apps Jobs to new image
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/pea-pipeline:${{ github.sha }}
          az containerapp job update \
            --name pea-daily \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image $IMAGE
          az containerapp job update \
            --name pea-backfill \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image $IMAGE
